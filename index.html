<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: monospace;
    color: #aaa;
  }
  #controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  button {
    background: #2a2a2a;
    color: #ccc;
    border: 1px solid #444;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #3a3a3a; }
  button.connected { background: #1a3a1a; border-color: #3a7a3a; color: #6c6; }
  #status {
    font-size: 12px;
    color: #666;
  }
  #fps-display {
    font-size: 12px;
    color: #555;
  }
  canvas {
    image-rendering: pixelated;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    background: #000;
  }
  #brightness-control {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 12px;
  }
  input[type="range"] {
    width: 120px;
    accent-color: #666;
  }
</style>
</head>
<body>

<div id="controls">
  <button id="connect-btn" onclick="toggleSerial()">Connect Interstate 75</button>
  <span id="status">disconnected</span>
  <span id="fps-display"></span>
</div>

<canvas id="display" width="32" height="32" style="width:512px;height:512px;"></canvas>

<div id="brightness-control">
  <label for="brightness">Brightness:</label>
  <input type="range" id="brightness" min="5" max="100" value="100">
  <span id="brightness-val">100%</span>
</div>

<script>
const W = 32, H = 32;
const PIXELS = W * H;               // 1024
const FRAME_SIZE = PIXELS * 3;       // 3072 bytes RGB888
const SYNC_BYTE = 0xFF;

// --- Canvas setup ---
const canvas = document.getElementById('display');
const ctx = canvas.getContext('2d');
const imageData = ctx.createImageData(W, H);
const imgBuf = imageData.data; // Uint8ClampedArray RGBA

// Frame buffer: RGB888 for display
const frameBuffer = new Uint8Array(FRAME_SIZE);
// Serial packet: sync byte + RGB888 pixels (pre-allocated)
const serialPacket = new Uint8Array(1 + FRAME_SIZE);
serialPacket[0] = SYNC_BYTE;

function setPixel(x, y, r, g, b) {
  if (x < 0 || x >= W || y < 0 || y >= H) return;
  const bi = (y * W + x) * 3;
  frameBuffer[bi] = r;
  frameBuffer[bi + 1] = g;
  frameBuffer[bi + 2] = b;
}

function addPixel(x, y, r, g, b) {
  const bi = (y * W + x) * 3;
  const nr = frameBuffer[bi] + r;
  const ng = frameBuffer[bi + 1] + g;
  const nb = frameBuffer[bi + 2] + b;
  frameBuffer[bi] = nr > 255 ? 255 : nr;
  frameBuffer[bi + 1] = ng > 255 ? 255 : ng;
  frameBuffer[bi + 2] = nb > 255 ? 255 : nb;
}

function flushDisplay() {
  // Convert RGB frameBuffer → RGBA imageData in one pass
  for (let i = 0, j = 0; i < FRAME_SIZE; i += 3, j += 4) {
    imgBuf[j] = frameBuffer[i];
    imgBuf[j + 1] = frameBuffer[i + 1];
    imgBuf[j + 2] = frameBuffer[i + 2];
    imgBuf[j + 3] = 255; // alpha
  }
  ctx.putImageData(imageData, 0, 0);
}

// --- WebUSB connection (fire-and-forget, no ACK) ---
// VID 0x2E8A = Raspberry Pi, PID 0x000A = custom LED matrix (set in firmware)
const USB_VENDOR_ID  = 0x2E8A;
const USB_PRODUCT_ID = 0x000A;
const USB_EP_OUT     = 1;      // bulk OUT endpoint number

let usbDevice = null;
let usbConnected = false;
let sending = false;
let framesSent = 0;
let lastFpsTime = performance.now();

const statusEl = document.getElementById('status');
const connectBtn = document.getElementById('connect-btn');
const fpsEl = document.getElementById('fps-display');
const brightnessSlider = document.getElementById('brightness');
const brightnessVal = document.getElementById('brightness-val');

brightnessSlider.addEventListener('input', () => {
  brightnessVal.textContent = brightnessSlider.value + '%';
});

async function toggleSerial() {
  if (usbConnected) {
    await disconnectUSB();
  } else {
    await connectUSB();
  }
}

async function connectUSB() {
  if (!navigator.usb) {
    statusEl.textContent = 'WebUSB not supported (use Chrome/Edge)';
    statusEl.style.color = '#c66';
    return;
  }
  try {
    usbDevice = await navigator.usb.requestDevice({
      filters: [{ vendorId: USB_VENDOR_ID, productId: USB_PRODUCT_ID }]
    });
    await usbDevice.open();
    await usbDevice.selectConfiguration(1);
    await usbDevice.claimInterface(0);

    usbConnected = true;
    connectBtn.textContent = 'Disconnect';
    connectBtn.classList.add('connected');
    statusEl.textContent = 'connected';
    statusEl.style.color = '#6c6';
  } catch (e) {
    console.error('WebUSB connect failed:', e);
    statusEl.textContent = 'failed: ' + e.message;
    statusEl.style.color = '#c66';
  }
}

async function disconnectUSB() {
  usbConnected = false;
  try {
    if (usbDevice) {
      await usbDevice.releaseInterface(0);
      await usbDevice.close();
      usbDevice = null;
    }
  } catch (e) { /* ignore cleanup errors */ }

  connectBtn.textContent = 'Connect Interstate 75';
  connectBtn.classList.remove('connected');
  statusEl.textContent = 'disconnected';
  statusEl.style.color = '#666';
  fpsEl.textContent = '';
}

function sendFrame() {
  if (!usbConnected || !usbDevice || sending) return;
  sending = true;

  const brightness = brightnessSlider.value / 100;

  // Apply brightness and cap at 0xFE to keep sync byte 0xFF unambiguous
  if (brightness >= 1.0) {
    for (let i = 0; i < FRAME_SIZE; i++) {
      serialPacket[1 + i] = frameBuffer[i] >= 0xFF ? 0xFE : frameBuffer[i];
    }
  } else {
    for (let i = 0; i < FRAME_SIZE; i++) {
      const v = (frameBuffer[i] * brightness) | 0;
      serialPacket[1 + i] = v >= 0xFF ? 0xFE : v;
    }
  }

  // transferOut sends the entire packet as pipelined 64-byte USB bulk packets.
  // No baud rate, no OS serial driver — direct to the device's bulk endpoint.
  usbDevice.transferOut(USB_EP_OUT, serialPacket).then(() => {
    sending = false;
    framesSent++;
  }).catch((e) => {
    sending = false;
    console.error('WebUSB write error:', e);
    disconnectUSB();
  });

  const now = performance.now();
  if (now - lastFpsTime > 1000) {
    const fps = Math.round(framesSent / ((now - lastFpsTime) / 1000));
    fpsEl.textContent = `${fps} fps to device`;
    framesSent = 0;
    lastFpsTime = now;
  }
}

// --- Animation: particles on black ---
let t = 0;

// Particle system
const NUM_PARTICLES = 12;
const particles = [];
for (let i = 0; i < NUM_PARTICLES; i++) {
  particles.push({
    cx: 16, cy: 16,
    rx: 4 + Math.random() * 11,
    ry: 4 + Math.random() * 11,
    speed: 0.3 + Math.random() * 0.8,
    phase: Math.random() * Math.PI * 2,
    r: Math.floor(80 + Math.random() * 175),
    g: Math.floor(80 + Math.random() * 175),
    b: Math.floor(80 + Math.random() * 175),
    size: 1.5 + Math.random() * 1.5,
    trail: [],
    trailLen: 4 + Math.floor(Math.random() * 6),
  });
}

// Shooting stars (occasional)
const shootingStars = [];

function spawnShootingStar() {
  const edge = Math.floor(Math.random() * 4);
  let sx, sy, vx, vy;
  if (edge === 0) { sx = -1; sy = Math.random() * H; vx = 1.5 + Math.random(); vy = (Math.random() - 0.5) * 0.8; }
  else if (edge === 1) { sx = W; sy = Math.random() * H; vx = -(1.5 + Math.random()); vy = (Math.random() - 0.5) * 0.8; }
  else if (edge === 2) { sx = Math.random() * W; sy = -1; vx = (Math.random() - 0.5) * 0.8; vy = 1.5 + Math.random(); }
  else { sx = Math.random() * W; sy = H; vx = (Math.random() - 0.5) * 0.8; vy = -(1.5 + Math.random()); }
  shootingStars.push({ x: sx, y: sy, vx, vy, life: 1.0 });
}

function animate() {
  t += 0.03;

  // Clear buffer to black
  frameBuffer.fill(0);

  // Occasionally spawn shooting stars
  if (Math.random() < 0.02) spawnShootingStar();

  // Update and draw shooting stars
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    s.x += s.vx;
    s.y += s.vy;
    s.life -= 0.03;
    if (s.life <= 0 || s.x < -2 || s.x > W + 2 || s.y < -2 || s.y > H + 2) {
      shootingStars.splice(i, 1);
      continue;
    }
    for (let j = 0; j < 4; j++) {
      const tx = Math.round(s.x - s.vx * j * 0.4);
      const ty = Math.round(s.y - s.vy * j * 0.4);
      const fade = s.life * (1 - j * 0.25);
      if (tx >= 0 && tx < W && ty >= 0 && ty < H) {
        addPixel(tx, ty, (255 * fade) | 0, (255 * fade) | 0, (200 * fade) | 0);
      }
    }
  }

  // Update and draw particles
  for (const p of particles) {
    const angle = t * p.speed + p.phase;
    const wobble = Math.sin(t * 0.7 + p.phase * 2) * 3;
    const x = p.cx + Math.cos(angle) * (p.rx + wobble);
    const y = p.cy + Math.sin(angle) * (p.ry + wobble * 0.5);

    // Update trail
    p.trail.unshift({ x, y });
    if (p.trail.length > p.trailLen) p.trail.pop();

    // Draw trail (fading)
    for (let i = p.trail.length - 1; i >= 0; i--) {
      const fade = (1 - i / p.trailLen) * 0.4;
      const tx = Math.round(p.trail[i].x);
      const ty = Math.round(p.trail[i].y);
      if (tx >= 0 && tx < W && ty >= 0 && ty < H) {
        addPixel(tx, ty, (p.r * fade) | 0, (p.g * fade) | 0, (p.b * fade) | 0);
      }
    }

    // Draw particle glow
    const px = Math.round(x);
    const py = Math.round(y);
    const radius = Math.ceil(p.size);
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d <= p.size) {
          const br = 1 - d / (p.size + 0.5);
          const sx = px + dx, sy = py + dy;
          if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
            addPixel(sx, sy, (p.r * br) | 0, (p.g * br) | 0, (p.b * br) | 0);
          }
        }
      }
    }
  }

  // Single putImageData call replaces 1024 DOM updates
  flushDisplay();

  // Send frame to device if connected
  sendFrame();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
