<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: monospace;
    color: #aaa;
  }
  #controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  button {
    background: #2a2a2a;
    color: #ccc;
    border: 1px solid #444;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #3a3a3a; }
  button.connected { background: #1a3a1a; border-color: #3a7a3a; color: #6c6; }
  #status {
    font-size: 12px;
    color: #666;
  }
  #fps-display {
    font-size: 12px;
    color: #555;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(32, 14px);
    grid-template-rows: repeat(32, 14px);
    gap: 2px;
    padding: 16px;
    background: #0a0a0a;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
  }
  .pixel {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    background: #1a1a1a;
  }
  #brightness-control {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 12px;
  }
  input[type="range"] {
    width: 120px;
    accent-color: #666;
  }
</style>
</head>
<body>

<div id="controls">
  <button id="connect-btn" onclick="toggleSerial()">Connect Interstate 75</button>
  <span id="status">disconnected</span>
  <span id="fps-display"></span>
</div>

<div id="grid"></div>

<div id="brightness-control">
  <label for="brightness">Brightness:</label>
  <input type="range" id="brightness" min="5" max="100" value="50">
  <span id="brightness-val">50%</span>
</div>

<script>
const W = 32, H = 32;
const FRAME_SIZE = W * H * 3;
const SYNC_BYTE = 0xFF;
const ACK_BYTE = 0x06;

// --- Grid setup ---
const grid = document.getElementById('grid');
const pixels = [];

for (let i = 0; i < W * H; i++) {
  const el = document.createElement('div');
  el.className = 'pixel';
  grid.appendChild(el);
  pixels.push(el);
}

// Frame buffer: stores current frame as flat RGB array
const frameBuffer = new Uint8Array(FRAME_SIZE);

function setPixel(x, y, r, g, b) {
  if (x < 0 || x >= W || y < 0 || y >= H) return;
  const i = (y * W + x);
  const bi = i * 3;
  frameBuffer[bi] = r;
  frameBuffer[bi + 1] = g;
  frameBuffer[bi + 2] = b;
  pixels[i].style.background = `rgb(${r},${g},${b})`;
}

// --- Serial connection ---
let port = null;
let writer = null;
let reader = null;
let serialConnected = false;
let waitingForAck = false;
let frameDropped = 0;
let framesSent = 0;
let lastFpsTime = performance.now();
let lastSendTime = 0;

const statusEl = document.getElementById('status');
const connectBtn = document.getElementById('connect-btn');
const fpsEl = document.getElementById('fps-display');
const brightnessSlider = document.getElementById('brightness');
const brightnessVal = document.getElementById('brightness-val');

brightnessSlider.addEventListener('input', () => {
  brightnessVal.textContent = brightnessSlider.value + '%';
});

async function toggleSerial() {
  if (serialConnected) {
    await disconnectSerial();
  } else {
    await connectSerial();
  }
}

async function connectSerial() {
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 1500000 });

    writer = port.writable.getWriter();
    reader = port.readable.getReader();

    serialConnected = true;
    waitingForAck = false;
    connectBtn.textContent = 'Disconnect';
    connectBtn.classList.add('connected');
    statusEl.textContent = 'connected';
    statusEl.style.color = '#6c6';

    console.log('Serial connected, starting ACK reader...');

    // Start reading ACKs in background
    readAcks();
  } catch (e) {
    console.error('Serial connect failed:', e);
    statusEl.textContent = 'failed: ' + e.message;
    statusEl.style.color = '#c66';
  }
}

async function disconnectSerial() {
  serialConnected = false;
  try {
    if (reader) { await reader.cancel(); reader.releaseLock(); reader = null; }
    if (writer) { writer.releaseLock(); writer = null; }
    if (port) { await port.close(); port = null; }
  } catch (e) { /* ignore cleanup errors */ }

  connectBtn.textContent = 'Connect Interstate 75';
  connectBtn.classList.remove('connected');
  statusEl.textContent = 'disconnected';
  statusEl.style.color = '#666';
  fpsEl.textContent = '';
}

async function readAcks() {
  try {
    while (serialConnected) {
      const { value, done } = await reader.read();
      if (done) break;
      if (value) {
        console.log('Serial RX:', Array.from(value).map(b => '0x' + b.toString(16).padStart(2,'0')).join(' '));
        for (const byte of value) {
          if (byte === ACK_BYTE) {
            waitingForAck = false;
          }
        }
      }
    }
  } catch (e) {
    if (serialConnected) {
      console.error('Serial read error:', e);
      await disconnectSerial();
    }
  }
}

async function sendFrame() {
  if (!serialConnected || !writer) return;

  // Timeout: if ACK hasn't come back in 500ms, send anyway
  if (waitingForAck) {
    const now = performance.now();
    if (now - lastSendTime < 500) {
      frameDropped++;
      return;
    }
    console.warn('ACK timeout — sending anyway');
    waitingForAck = false;
  }

  try {
    const brightness = brightnessSlider.value / 100;

    // Build packet: sync byte + scaled frame data
    const packet = new Uint8Array(1 + FRAME_SIZE);
    packet[0] = SYNC_BYTE;
    for (let i = 0; i < FRAME_SIZE; i++) {
      packet[1 + i] = Math.floor(frameBuffer[i] * brightness);
    }

    waitingForAck = true;
    lastSendTime = performance.now();
    await writer.write(packet);
    framesSent++;
    if (framesSent <= 3) console.log(`Frame #${framesSent} sent (${packet.length} bytes)`);

    // Update FPS counter
    const now = performance.now();
    if (now - lastFpsTime > 1000) {
      const fps = Math.round(framesSent / ((now - lastFpsTime) / 1000));
      fpsEl.textContent = `${fps} fps to device (${frameDropped} dropped)`;
      framesSent = 0;
      frameDropped = 0;
      lastFpsTime = now;
    }
  } catch (e) {
    console.error('Serial write error:', e);
    await disconnectSerial();
  }
}

// --- Animation ---
let t = 0;

function animate() {
  t += 0.03;

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const v1 = Math.sin(x * 0.3 + t);
      const v2 = Math.sin(y * 0.3 + t * 0.7);
      const v3 = Math.sin((x + y) * 0.2 + t * 0.5);
      const v4 = Math.sin(Math.sqrt(((x - 16) ** 2 + (y - 16) ** 2)) * 0.4 - t);
      const v = (v1 + v2 + v3 + v4) / 4;

      const r = Math.floor((Math.sin(v * Math.PI) * 0.5 + 0.5) * 180);
      const g = Math.floor((Math.sin(v * Math.PI + 2) * 0.5 + 0.5) * 120);
      const b = Math.floor((Math.sin(v * Math.PI + 4) * 0.5 + 0.5) * 255);

      setPixel(x, y, r, g, b);
    }
  }

  // Bouncing bright dot
  const bx = Math.floor(16 + Math.sin(t * 1.3) * 12);
  const by = Math.floor(16 + Math.cos(t * 1.7) * 12);
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d <= 2) {
        const br = Math.max(0, 1 - d / 2.5);
        const px = bx + dx, py = by + dy;
        if (px >= 0 && px < W && py >= 0 && py < H) {
          setPixel(px, py, Math.floor(255 * br), Math.floor(255 * br), Math.floor(255 * br));
        }
      }
    }
  }

  // Second dot
  const cx = Math.floor(16 + Math.cos(t * 0.9) * 10);
  const cy = Math.floor(16 + Math.sin(t * 1.1) * 10);
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d <= 1.5) {
        const br = Math.max(0, 1 - d / 2);
        setPixel(cx + dx, cy + dy, Math.floor(255 * br), Math.floor(100 * br), Math.floor(50 * br));
      }
    }
  }

  // Send frame to device if connected
  sendFrame();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
