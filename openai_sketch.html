<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>p5.js + OpenAI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; font-family: monospace; }
    #controls { padding: 16px; display: flex; gap: 10px; align-items: center; }
    input[type="text"] {
      width: 400px; padding: 10px; border-radius: 6px;
      border: 1px solid #444; background: #16213e; color: #eee;
      font-family: monospace; font-size: 14px;
    }
    button {
      padding: 10px 20px; border-radius: 6px; border: none;
      background: #0f3460; color: #e94560; font-family: monospace;
      font-size: 14px; cursor: pointer; font-weight: bold;
    }
    button:hover { background: #e94560; color: #fff; }
    #api-key-row { padding: 8px 16px 0; display: flex; gap: 10px; align-items: center; }
    label { color: #aaa; font-size: 13px; }
  </style>
</head>
<body>
  <div id="api-key-row">
    <label>OpenAI API Key:</label>
    <input type="password" id="api-key" placeholder="sk-..." style="width:300px;padding:8px;border-radius:6px;border:1px solid #444;background:#16213e;color:#eee;font-family:monospace;" />
  </div>
  <div id="controls">
    <input type="text" id="prompt-input" placeholder="Ask something..." value="Give me one inspiring word." />
    <button onclick="sendPrompt()">Send</button>
  </div>
  <div id="sketch-container"></div>

  <script>
    let responseText = "Hit Send to talk to OpenAI.";
    let isLoading = false;

    async function sendPrompt() {
      const apiKey = document.getElementById("api-key").value.trim();
      const prompt = document.getElementById("prompt-input").value.trim();

      if (!apiKey) { responseText = "Please enter your OpenAI API key."; return; }
      if (!prompt)  { responseText = "Please enter a prompt."; return; }

      isLoading = true;
      responseText = "Loading...";

      try {
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [{ role: "user", content: prompt }],
            max_tokens: 200
          })
        });

        if (!res.ok) {
          const err = await res.json();
          responseText = "Error: " + (err.error?.message || res.statusText);
        } else {
          const data = await res.json();
          responseText = data.choices[0].message.content.trim();
        }
      } catch (e) {
        responseText = "Network error: " + e.message;
      }

      isLoading = false;
    }

    // p5.js sketch
    new p5(function(p) {
      let t = 0;

      p.setup = function() {
        let cnv = p.createCanvas(600, 300);
        cnv.parent("sketch-container");
        p.textFont("monospace");
      };

      p.draw = function() {
        p.background(26, 26, 46);
        t += 0.02;

        // Animated background particles
        p.noStroke();
        for (let i = 0; i < 40; i++) {
          let x = (i * 173.7 + t * 20) % p.width;
          let y = (i * 97.3 + Math.sin(t + i) * 30 + 150) % p.height;
          let alpha = 80 + 60 * Math.sin(t + i * 0.5);
          p.fill(233, 69, 96, alpha);
          p.ellipse(x, y, 3, 3);
        }

        // Response box
        p.fill(15, 52, 96, 200);
        p.stroke(233, 69, 96, 150);
        p.strokeWeight(1);
        p.rect(30, 30, p.width - 60, p.height - 60, 10);

        // Loading spinner
        if (isLoading) {
          p.noFill();
          p.stroke(233, 69, 96);
          p.strokeWeight(3);
          p.arc(p.width / 2, p.height / 2, 40, 40, t * 3, t * 3 + p.PI * 1.5);
        }

        // Response text (word-wrapped)
        p.noStroke();
        p.fill(220, 220, 255);
        p.textSize(15);
        p.textAlign(p.CENTER, p.CENTER);
        p.textLeading(22);

        let words = responseText.split(" ");
        let lines = [];
        let line = "";
        let maxW = p.width - 100;

        for (let word of words) {
          let test = line ? line + " " + word : word;
          if (p.textWidth(test) > maxW) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);

        let startY = p.height / 2 - ((lines.length - 1) * 22) / 2;
        for (let i = 0; i < lines.length; i++) {
          p.text(lines[i], p.width / 2, startY + i * 22);
        }
      };
    });
  </script>
</body>
</html>
